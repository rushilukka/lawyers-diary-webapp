<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#5D4037"/>
  <!-- Scales of Justice -->
  <g transform="translate(256,256)" fill="none" stroke="#FFD700" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center post -->
    <line x1="0" y1="-120" x2="0" y2="140"/>
    <!-- Base -->
    <line x1="-60" y1="140" x2="60" y2="140"/>
    <!-- Cross beam -->
    <line x1="-120" y1="-100" x2="120" y2="-100"/>
    <!-- Top circle -->
    <circle cx="0" cy="-130" r="14" fill="#FFD700"/>
    <!-- Left pan strings -->
    <line x1="-120" y1="-100" x2="-140" y2="20"/>
    <line x1="-120" y1="-100" x2="-100" y2="20"/>
    <!-- Left pan -->
    <path d="M-155,20 Q-120,55 -85,20" fill="#FFD700" stroke="#FFD700"/>
    <!-- Right pan strings -->
    <line x1="120" y1="-100" x2="100" y2="20"/>
    <line x1="120" y1="-100" x2="140" y2="20"/>
    <!-- Right pan -->
    <path d="M85,20 Q120,55 155,20" fill="#FFD700" stroke="#FFD700"/>
  </g>
</svg>
